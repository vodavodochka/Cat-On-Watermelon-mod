name: Build Mod

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          rm -f build/libs/*.jar
          ./gradlew build

      - name: Find built jar
        id: find_jar
        shell: bash
        run: |
          echo "Current directory: $(pwd)"
          VERSION=$(python3 -c "import json, pathlib; p = pathlib.Path('src/main/resources/mcmod.info'); data = json.loads(p.read_text(encoding='utf-8')); print(data[0]['version'] if isinstance(data, list) else data.get('version', '0.0.0'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -f "build/libs/catOnWatermelon-$VERSION.jar" ]; then
            echo "jar_path=build/libs/catOnWatermelon-$VERSION.jar" >> "$GITHUB_OUTPUT"
            echo "artifact_name=cat-on-watermelon-$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "jar_path=" >> "$GITHUB_OUTPUT"
            echo "artifact_name=cat-on-watermelon" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Artifact
        if: steps.find_jar.outputs.jar_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_jar.outputs.artifact_name }}
          path: ${{ steps.find_jar.outputs.jar_path }}
          if-no-files-found: error